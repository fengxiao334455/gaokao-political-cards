{b:'必修3 政治与法治',c:'人民当家作主',s:'基层群众自治制度包括农村村民自治和城市居民自治，是社会主义民主最广泛的实践',k:'基层自治 村民自治 居民自治 村委会 居委会',e:'村里修路要不要集资？由村民会议投票决定(民主决策)；村务公开栏晒出每一笔账(民主监督)——基层民主看得见。'},
{b:'必修3 政治与法治',c:'全面依法治国',s:'全面依法治国是中国特色社会主义的本质要求和重要保障，总目标是建设社会主义法治体系、建设社会主义法治国家',k:'依法治国 法治体系 法治国家 本质要求',e:'从民法典的编纂到长江保护法的实施——国家在方方面面做到有法可依，用法治守护每个人的权利。'},

{b:'必修3 政治与法治',c:'全面依法治国',s:'法治政府建设核心是依法行政，要求政府用法治思维和法治方式履行职责',k:'法治政府 依法行政 法定职责 权力清单',e:'"法无授权不可为"——政府公布权力清单，清单之外不可为；"法定职责必须为"——推诿扯皮将追责。'},

// ========== 必修4 哲学与文化 ==========
{b:'必修4 哲学与文化',c:'哲学概论',s:'哲学是关于世界观的学说，是世界观和方法论的统一，为具体科学提供世界观和方法论指导',k:'哲学 世界观 方法论 具体科学 指导',e:'"世界是物质的还是精神的？"这是世界观；"那我应该怎么对待世界？"这是方法论。物理学研究具体规律，哲学提供根本看法。'},
{b:'必修4 哲学与文化',c:'哲学概论',s:'哲学的基本问题是思维与存在的关系问题（即意识和物质的关系问题）',k:'哲学基本问题 思维与存在 物质与意识 第一性',e:'天地万物是本来就存在的(存在决定思维)，还是我心想的(思维决定存在)——这是哲学基本问题的第一方面。'},
{b:'必修4 哲学与文化',c:'哲学概论',s:'唯物主义认为物质是世界的本原，包括古代朴素唯物主义、近代形而上学唯物主义和辩证唯物主义',k:'唯物主义 物质本原 朴素 形而上学 辩证',e:'泰勒斯说"水是万物之源"(朴素)；培根认为原子是世界的本原(形而上学)；马克思认为物质决定意识且世界是发展的(辩证)。'},
{b:'必修4 哲学与文化',c:'哲学概论',s:'唯心主义认为意识是世界的本原，包括主观唯心主义和客观唯心主义',k:'唯心主义 意识本原 主观唯心 客观唯心',e:'"我思故我在""心外无物"(主观唯心主义)；"理在事先""绝对精神"(客观唯心主义)——两者颠倒了物质与意识的关系。'},
{b:'必修4 哲学与文化',c:'唯物论',s:'物质是不依赖于人的意识并能为人的意识所反映的客观实在，物质的唯一特性是客观实在性',k:'物质 客观实在性 不依赖意识 可知',e:'教室里的课桌、窗外的树木、远处的山——不管我是否看见它们，它们都客观存在。但"意识"却依赖大脑这个物质器官。'},
{b:'必修4 哲学与文化',c:'唯物论',s:'物质与运动不可分割：物质是运动的物质，运动是物质的根本属性和存在方式',k:'运动 物质 根本属性 存在方式 静止',e:'地球时刻在自转公转(物质在运动)，人的细胞不断新陈代谢(生命在运动)。"刻舟求剑"的荒谬就在于否认了运动。'},
{b:'必修4 哲学与文化',c:'唯物论',s:'规律是客观的，不以人的意志为转移，但人可以在认识规律的基础上利用规律造福人类',k:'规律 客观性 主观能动性 尊重规律',e:'"庖丁解牛"之所以游刃有余，是因为他掌握了牛的骨骼结构规律。尊重规律不是束手无策，而是更好地利用它。'},
{b:'必修4 哲学与文化',c:'唯物论',s:'意识是人脑的机能和属性，是客观存在在人脑中的反映，具有目的性、自觉选择性和能动创造性',k:'意识 人脑 反映 目的性 创造性',e:'建筑师在造楼之前脑中已有设计图(目的性)；画师从万千风景中选择黄山作画(选择性)；作家创作科幻小说(创造性)——都是意识能动性的体现。'},
{b:'必修4 哲学与文化',c:'唯物论',s:'物质决定意识，意识对物质具有能动的反作用——正确意识促进发展，错误意识阻碍发展',k:'物质决定意识 意识反作用 正确vs错误 促进vs阻碍',e:'我国的基本国情(物质)决定必须实施"双碳"战略，而"绿水青山就是金山银山"的正确理念(意识)又推动了生态文明建设。'},
{b:'必修4 哲学与文化',c:'认识论',s:'实践是认识的基础：实践是认识的来源、动力、检验标准和目的归宿',k:'实践 认识基础 来源 动力 标准',e:'"要想知道梨子的味道，就要亲口尝一尝"——实践出真知。杂交水稻的成功是袁隆平团队无数次试验的结果，实践检验了理论的正确性。'},
{b:'必修4 哲学与文化',c:'认识论',s:'真理是标志主观与客观相符合的哲学范畴，是具体的、有条件的、是过程',k:'真理 主观符合客观 具体性 条件性 过程',e:'"三角形内角和等于180°"是真理——但在球面上并不成立（条件性）。真理不是一次完成的，是不断发展的过程。'},
{b:'必修4 哲学与文化',c:'认识论',s:'认识具有反复性、无限性和上升性，追求真理是一个永无止境的过程',k:'反复性 无限性 上升性 追求真理',e:'从"地心说"到"日心说"再到"宇宙大爆炸"——人类对宇宙的认识不断深化，永远在接近真理的路上。'},
{b:'必修4 哲学与文化',c:'辩证法——联系观',s:'联系具有普遍性、客观性和多样性，要用联系的观点看问题',k:'联系 普遍性 客观性 多样性 整体',e:'"蝴蝶效应"——亚马逊雨林一只蝴蝶扇动翅膀可能引起美国德克萨斯州一场龙卷风（普遍联系）；"城门失火，殃及池鱼"——事物相互影响。'},
{b:'必修4 哲学与文化',c:'辩证法——联系观',s:'整体与部分是辩证统一的：整体居于主导地位，部分影响整体，关键部分甚至对整体起决定作用',k:'整体与部分 主导 关键部分 系统优化',e:'"木桶理论"——木桶能装多少水取决于最短的那块木板(关键部分影响整体)；"全国一盘棋"——要顾全大局(整体主导)。'},
{b:'必修4 哲学与文化',c:'辩证法——发展观',s:'发展的实质是事物的前进和上升，是新事物的产生和旧事物的灭亡',k:'发展 实质 新事物 旧事物 前进上升',e:'"沉舟侧畔千帆过，病树前头万木春"——沉船旁千帆竞发，枯树前万木争春。新事物必将取代旧事物，这就是发展的实质。'},
{b:'必修4 哲学与文化',c:'辩证法——发展观',s:'量变是质变的必要准备，质变是量变的必然结果，要重视量的积累并促成质变',k:'量变质变 积累 飞跃 适度原则',e:'"不积跬步无以至千里"——每天背5个单词(量变)，一年后掌握1800+单词(质变)。但吃饭吃七分饱即可——也要坚持适度原则。'},
{b:'必修4 哲学与文化',c:'辩证法——矛盾观',s:'矛盾即对立统一，矛盾是事物发展的源泉和根本动力',k:'矛盾 对立统一 源泉 动力 斗争性 同一性',e:'"祸兮福之所倚，福兮祸之所伏"——祸与福既对立(相反)又统一(互相转化)。学习中的困难和进步也是对立统一的关系。'},
{b:'必修4 哲学与文化',c:'辩证法——矛盾观',s:'矛盾普遍性与特殊性相互联结：普遍性寓于特殊性之中，特殊性包含普遍性',k:'普遍性 特殊性 共性与个性 相互联结',e:'"白马非马"的诡辩错误在于割裂了共性与个性的关系。所有马(共性)都有四条腿，但白马(个性)只是马的一种。'},
{b:'必修4 哲学与文化',c:'辩证法——矛盾观',s:'主次矛盾和矛盾主次方面原理要求：抓主要矛盾（重点论）、看问题分清主流和支流',k:'主要矛盾 次要矛盾 主流 支流 两点论 重点论',e:'"打蛇打七寸"——解决问题要抓关键（主要矛盾）；"瑕不掩瑜"——评价一个人要看主流（矛盾主要方面决定事物性质）。'},
{b:'必修4 哲学与文化',c:'辩证法——矛盾观',s:'辩证否定是事物自身的否定，是发展的环节和联系的环节，实质是"扬弃"',k:'辩证否定 扬弃 自己否定自己 发展环节 联系环节',e:'"取其精华、去其糟粕"——对待传统文化，不是全盘否定也不是全盘接受，而是辩证地"扬弃"。吃苹果也是否定（消化吸收）的过程。'},
{b:'必修4 哲学与文化',c:'历史唯物主义',s:'社会存在决定社会意识，社会意识具有相对独立性并对社会存在有反作用',k:'社会存在 社会意识 决定 反作用 独立性',e:'"仓廪实而知礼节"——物质生活水平（社会存在）决定了道德观念（社会意识）。但也要看到，先进的思想可以引领社会变革。'},
{b:'必修4 哲学与文化',c:'历史唯物主义',s:'人类社会的基本矛盾是生产力与生产关系的矛盾、经济基础与上层建筑的矛盾',k:'基本矛盾 生产力 生产关系 经济基础 上层建筑',e:'家庭联产承包责任制：调整生产关系(包产到户)适应了当时的生产力水平，粮食产量大幅增长——生产力决定生产关系，生产关系反作用于生产力。'},
{b:'必修4 哲学与文化',c:'历史唯物主义',s:'人民群众是历史的创造者，要坚持群众观点和群众路线',k:'人民群众 历史创造者 群众观点 群众路线',e:'"淮海战役的胜利是民工用小推车推出来的"——人民群众是真正的英雄。脱贫攻坚、抗击疫情都离不开亿万人民的参与。'},
{b:'必修4 哲学与文化',c:'历史唯物主义',s:'价值观对人们的行为有导向作用，要自觉站在最广大人民立场上作出价值判断和价值选择',k:'价值观 导向作用 价值判断 价值选择 人民立场',e:'张桂梅创办免费女子高中让1800多名贫困女孩走出大山——她的价值选择源于"让女孩受教育"的坚定价值观，站在了人民的立场上。'},
{b:'必修4 哲学与文化',c:'文化传承与创新',s:'中华优秀传统文化是中华民族的突出优势和文化软实力，要推动创造性转化和创新性发展',k:'传统文化 创造性转化 创新性发展 文化自信',e:'故宫文创将传统纹样印在手机壳上、汉服成为年轻人的日常穿搭——古为今用、推陈出新，让传统文化"活"起来。'},
{b:'必修4 哲学与文化',c:'文化传承与创新',s:'中华民族精神以爱国主义为核心，包括伟大创造、伟大奋斗、伟大团结、伟大梦想精神',k:'民族精神 爱国主义 创造 奋斗 团结 梦想',e:'"两弹一星"精神(创造)、红旗渠精神(奋斗)、抗疫精神(团结)、中国梦(梦想)——都是中华民族精神在当代的生动体现。'},
{b:'必修4 哲学与文化',c:'文化传承与创新',s:'文化交流要坚持"引进来"和"走出去"相结合，以我为主、为我所用，增强文化自信',k:'文化交流 引进来 走出去 文化自信 互鉴',e:'《流浪地球》走向世界（走出去）、引进国外优秀影视作品（引进来）、外国人来学中国功夫——在交流中彰显中华文化魅力。'},
{b:'必修4 哲学与文化',c:'文化传承与创新',s:'建设文化强国要培养高度的文化自信，推动文化事业和文化产业协调发展',k:'文化强国 文化自信 文化事业 文化产业 社会效益',e:'国家文化公园建设(文化事业)+《哪吒之魔童降世》票房超50亿(文化产业)——既保障基本文化权益，又满足多样化需求。'},

{b:'选必2 法律与生活',c:'民事权利与义务',s:'合同是民事主体之间设立、变更、终止民事法律关系的协议，双方必须自愿、平等、诚信',k:'合同 协议 自愿 平等 诚信 违约',e:'网上购物点击"同意协议"即成立合同；商家不能因为"标错价"单方面取消订单——合同一旦成立，双方都要遵守。'},

{b:'选必3 逻辑与思维',c:'逻辑思维',s:'概念是思维的基本单位，明确概念要明确内涵（本质属性）和外延（适用范围）',k:'概念 内涵 外延 定义 划分',e:'"人"的内涵是"能制造和使用工具的动物"，外延包括"男人、女人、大人、小孩"——内涵和外延是概念的两个方面。'},
{b:'选必3 逻辑与思维',c:'逻辑思维',s:'判断是对事物情况有所断定的思维形式，包括性质判断和关系判断',k:'判断 断定 性质判断 关系判断 真假',e:'"今天是晴天"(性质判断——对一件事的性质下判断)；"张三比李四高"(关系判断——两者间的关系)。判断有真假之分。'},
{b:'选必3 逻辑与思维',c:'逻辑思维',s:'演绎推理是从一般性前提推出特殊性结论的推理，三段论是其基本形式',k:'演绎推理 一般到特殊 三段论 大前提 小前提',e:'所有人都会死（大前提）；苏格拉底是人（小前提）；所以苏格拉底也会死（结论）——演绎推理保真。'},
{b:'选必3 逻辑与思维',c:'逻辑思维',s:'归纳推理是从特殊性前提推出一般性结论的推理，完全归纳可靠但难实现，不完全归纳是常用方法',k:'归纳推理 特殊到一般 完全归纳 不完全归纳 因果',e:'观察1万只天鹅都是白色的→"天鹅都是白色的"（不完全归纳，未必真——黑天鹅的存在证伪了它）。归纳推理是发现规律的重要工具。'},
{b:'选必3 逻辑与思维',c:'逻辑思维',s:'类比推理是根据两个对象在某些属性上相同，推出它们在其他属性上也相同的推理',k:'类比推理 相似属性 推出 或然性',e:'"蝙蝠和鸟都有翅膀会飞，蝙蝠是哺乳动物"——如果鸟有翅膀，鸟是不是哺乳动物？类比推理得出的结论不一定可靠（蝙蝠才是），但可以帮助发现新知识。'},
{b:'选必3 逻辑与思维',c:'辩证思维',s:'辩证思维用联系、发展、全面的观点看问题，反对形而上学',k:'辩证思维 联系 发展 全面 形而上学',e:'看"双减"政策：既要看到减轻了学生负担(好处)，也要看到家长焦虑如何缓解(问题)——辩证地、全面地分析。'},
{b:'选必3 逻辑与思维',c:'辩证思维',s:'分析与综合是辩证统一的：分析为综合做准备，综合是分析的完成，二者相互依赖',k:'分析 综合 部分 整体 统一',e:'"解剖麻雀"——先研究身体的各个器官(分析)，再理解人体整体功能(综合)。学习也是：先学各章节再做整套卷子。'},
{b:'选必3 逻辑与思维',c:'创新思维',s:'发散思维以一个问题为中心向四面八方联想，常用头脑风暴法',k:'发散思维 头脑风暴 联想 多角度 创新',e:'回形针有多少种用途？夹文件、做挂钩、撬锁、当牙签……（头脑风暴，越多越好）——发散思维打破思维定势。'},
{b:'选必3 逻辑与思维',c:'创新思维',s:'聚合思维针对问题从多种思路中寻求最优方案，与发散思维相辅相成',k:'聚合思维 最佳方案 筛选 聚焦 优化',e:'高考作文立意：先想十几个角度（发散→广泛联想），然后结合材料和自身积累选定最有力的1-2个论点（聚合→聚焦最优）。'},

  {b:'必修3 政治与法治',c:'全面依法治国',s:'立法程序四步骤：提出法律案→审议→表决通过→公布',k:'立法程序 议案 审议 表决 公布',e:'民法典立法历时多年：草案提出→全国人大常委会三次审议→全国人大表决通过→国家主席签署公布——严格依法立法。'},
  {b:'必修3 政治与法治',c:'全面依法治国',s:'严格执法要求行政执法合法行政、合理行政、程序正当、高效便民、诚实守信',k:'严格执法 合法行政 程序正当 高效便民 权责统一',e:'交警开罚单必须出示证件说明理由（程序正当）、罚款必须上缴国库（合法行政）——执法不能"任性"。'},
  {b:'必修3 政治与法治',c:'全面依法治国',s:'公正司法要求法院检察院依法独立公正行使审判权和检察权',k:'公正司法 审判权 检察权 独立公正 司法公正',e:'法官审案只服从法律，不受行政机关、社会团体和个人干涉——"让审理者裁判、由裁判者负责"。'},
  {b:'必修3 政治与法治',c:'全面依法治国',s:'全民守法要求公民依法行使权利、依法履行义务、依法维护权益',k:'全民守法 行使权利 履行义务 维权 法治意识',e:'买到假货打12315维权（依法维权）、依法纳税（履行义务）、不造谣传谣（遵守法律）——人人守法是法治社会的基础。'},
  {b:'必修3 政治与法治',c:'全面依法治国',s:'坚持以人民为中心的法治立场，保障人民在法治中的主体地位',k:'人民中心 法治 人民主体 公平正义 法律服务',e:'法律援助为困难群众免费打官司、检察机关开展公益诉讼保护绿水青山——法治的温度体现在对人民权益的保障上。'},
  {b:'必修3 政治与法治',c:'全面依法治国',s:'国家治理体系和治理能力现代化要求法治体系完备、治理效能提升',k:'国家治理 治理体系 治理能力 现代化 法治',e:'从"管理"到"治理"的转变：政府不再是"全能型"，而是"服务型"——"放管服"改革就是治理现代化的具体体现。'},
  {b:'必修3 政治与法治',c:'人民当家作主',s:'协商民主是中国特色社会主义民主的重要形式，强调在决策前和决策中进行充分协商',k:'协商民主 决策前 决策中 凝聚共识 求同存异',e:'全国政协双周协商座谈会上，专家学者就"双减"政策提意见——协商民主让不同声音都能被听到，凝聚社会共识。'},
  {b:'必修3 政治与法治',c:'人民当家作主',s:'政务公开是法治政府建设的重要举措，保障公民知情权、参与权和监督权',k:'政务公开 透明 知情权 监督权 阳光政府',e:'政府预算"晒"在网上（财政透明）、行政许可流程网上可查（办事透明）——阳光是最好的防腐剂。'},
  {b:'必修3 政治与法治',c:'人民当家作主',s:'建设人民满意的服务型政府要求政府转变职能，简政放权，优化服务',k:'服务型政府 简政放权 放管服 转变职能',e:'"最多跑一次"改革——以前办证要跑十几个部门，现在一个窗口搞定。政府从"官老爷"变成"店小二"。'},
  {b:'必修3 政治与法治',c:'人民当家作主',s:'我国的国家职能包括对内维护国家稳定、对外抵御外来侵略，为现代化建设提供保障',k:'国家职能 对内 对外 防御 稳定 建设',e:'公安部打击电信诈骗（对内维稳）、解放军巡航南海捍卫主权（对外防御）、国家投资建设高铁（社会建设）——全面发挥国家职能。'},
  {b:'必修4 哲学与文化',c:'唯物论',s:'世界是物质的世界，物质世界的真正统一性在于它的物质性',k:'物质世界 统一性 物质性 客观实在',e:'无论是宏观的星球还是微观的原子，无论是有生命的动植物还是无生命的岩石——它们都是物质的，世界统一于物质。'},
  {b:'必修4 哲学与文化',c:'唯物论',s:'意识是物质世界长期发展的产物，是人脑特有的机能',k:'意识 起源 人脑 机能 物质产物',e:'动物只有本能和低级心理活动，只有人类能思考哲学问题、创作艺术品——意识是人脑这种特殊物质的产物。'},
  {b:'必修4 哲学与文化',c:'唯物论',s:'意识具有目的性、自觉选择性和能动创造性——不仅能反映现象还能揭示本质和规律',k:'意识 目的性 选择性 创造性 本质 规律',e:'科学家通过无数次实验发现原子结构（揭示本质）；建筑师设计出从未有过的建筑（创造性）——人脑不仅能"拍照片"还能"做加工"。'},
  {b:'必修4 哲学与文化',c:'唯物论',s:'一切从实际出发、实事求是是辩证唯物主义的基本要求',k:'一切从实际出发 实事求是 尊重规律 主观符合客观',e:'脱贫攻坚中"精准识别、精准施策"——不到贫困户家实地调查（实际出发）就无法制定有效帮扶措施（实事）。'},
  {b:'必修4 哲学与文化',c:'唯物论',s:'尊重客观规律与发挥主观能动性是辩证统一的，要把二者结合起来',k:'客观规律 主观能动性 尊重 发挥 结合',e:'天气预报预测台风路径（利用规律），提前转移群众减少损失（发挥能动性）——既要尊重自然规律又要积极作为。'},
  {b:'必修4 哲学与文化',c:'认识论',s:'实践具有客观物质性、主观能动性和社会历史性三大特征',k:'实践 客观物质性 主观能动性 社会历史性 特征',e:'高铁施工需要钢筋水泥（客观物质性）、工程师根据设计图纸施工（主观能动性）、不同年代的铁路技术不同（社会历史性）。'},
  {b:'必修4 哲学与文化',c:'认识论',s:'真理是客观的，真理面前人人平等，但真理又是具体的有条件的',k:'真理 客观性 具体性 条件性 真理面前平等',e:'"水在标准大气压下100度沸腾"是真理——但在青藏高原气压低，水80度就开了。真理的条件变了，真理也会变化。'},
  {b:'必修4 哲学与文化',c:'认识论',s:'认识的反复性：人们对事物的认识要经历从实践到认识、再从认识到实践的多次反复',k:'反复性 实践到认识 再实践再认识 螺旋上升',e:'对"市场经济"的认识：排斥(计划经济时期)→承认"市场为辅"(80年代)→"决定性作用"(十八届三中全会)——认识在反复中深化。'},
  {b:'必修4 哲学与文化',c:'辩证法——联系观',s:'联系的多样性要求我们全面分析事物存在的各种条件，一切以时间地点条件为转移',k:'联系多样性 条件 时间地点 转移 分析',e:'种庄稼要考虑气候、土壤、水源等多种条件（联系多样性）——不能"一刀切"，同一方法在不同条件下效果不同。'},
  {b:'必修4 哲学与文化',c:'辩证法——联系观',s:'系统是由相互联系和相互作用的诸要素构成的统一整体，具有整体性、有序性、结构化特征',k:'系统 整体性 有序性 结构优化 要素',e:'一台电脑由CPU、内存、硬盘等组成（要素），各部件按特定结构组合（有序），运转不行可能是单个部件或整体匹配问题。'},
  {b:'必修4 哲学与文化',c:'辩证法——发展观',s:'事物发展的方向是前进的、上升的，道路是曲折的、迂回的——前途光明道路曲折',k:'前进性 曲折性 方向 道路 新事物',e:'中国高铁从引进到自主创新经历了无数次试验失败（曲折），但最终实现了世界领先（前进）——任何新事物的发展都不可能一帆风顺。'},
  {b:'必修4 哲学与文化',c:'辩证法——发展观',s:'量变引起质变有两种方式：数量增减引起质变、结构优化引起质变',k:'量变 质变 数量增减 结构调整 飞跃',e:'水升温到100度沸腾（数量增减导致质变）；石墨和金刚石都由碳原子构成但结构不同（结构优化导致性质改变）。'},
  {b:'必修4 哲学与文化',c:'辩证法——矛盾观',s:'具体问题具体分析是马克思主义活的灵魂，是正确解决矛盾的关键',k:'具体问题具体分析 活的灵魂 矛盾特殊性 对症下药',e:'"对症下药""量体裁衣""因材施教"——不同矛盾用不同方法解决。疫情防控中精准划定风险区而非一刀切封城就是具体问题具体分析。'},
  {b:'必修4 哲学与文化',c:'辩证法——矛盾观',s:'两点论与重点论统一要求：既要抓主要矛盾又要兼顾次要矛盾',k:'两点论 重点论 主要矛盾 次要矛盾 统筹兼顾',e:'高中学习：主攻数学弱项（重点论/主要矛盾），但语文英语也不能完全放下（两点论/统筹兼顾）——不能只抓一点不及其余。'},
  {b:'必修4 哲学与文化',c:'辩证法——矛盾观',s:'主要矛盾决定事物发展进程，主要矛盾的主要方面决定事物的性质',k:'主要矛盾 主要方面 矛盾 性质 发展进程',e:'在学校中，教学质量是主要矛盾（决定学校发展）；评价一个学生，品德是矛盾的主要方面（决定性质），成绩次要。'},
  {b:'必修4 哲学与文化',c:'辩证法——矛盾观',s:'辩证否定的实质是"扬弃"——既肯定又否定，既克服又保留',k:'扬弃 辩证否定 肯定 否定 克服 保留',e:'对待中医：既否定其"阴阳五行"的玄学成分（克服），又肯定其针灸草药的实际疗效（保留）——扬弃不是简单地"好全好、坏全坏"。'},
  {b:'必修4 哲学与文化',c:'历史唯物主义',s:'社会发展的根本动力是社会基本矛盾运动：生产力与生产关系、经济基础与上层建筑',k:'社会动力 基本矛盾 生产力 生产关系 经济基础 上层建筑',e:'铁器代替青铜（生产力进步）→封建制代替奴隶制（生产关系变革）→建立封建国家制度（上层建筑变革）——层层推动社会前进。'},
  {b:'必修4 哲学与文化',c:'历史唯物主义',s:'改革是社会主义制度的自我完善和发展，是社会主义社会发展的直接动力',k:'改革 自我完善 直接动力 社会主义 制度创新',e:'农村改革（包产到户）→城市改革→全面深化改革——改革不是推翻社会主义制度，而是让它变得更好。'},
  {b:'必修4 哲学与文化',c:'历史唯物主义',s:'群众路线的基本内容：一切为了群众、一切依靠群众，从群众中来、到群众中去',k:'群众路线 一切为了群众 一切依靠群众 从群众中来 到群众中去',e:'"十四五"规划编制在网上广泛征求意见（从群众中来），最终形成规划指导全国发展（到群众中去）——群众路线的生动实践。'},
  {b:'必修4 哲学与文化',c:'历史唯物主义',s:'人的价值在于创造价值，在于对社会的责任和贡献——社会价值与自我价值统一',k:'人生价值 社会价值 自我价值 贡献 索取 统一',e:'袁隆平一生研究杂交水稻（社会价值），同时也获得了国家荣誉和人民尊重（自我价值）——在奉献社会中实现自身价值。'},
  {b:'必修4 哲学与文化',c:'历史唯物主义',s:'正确的价值判断和价值选择必须遵循社会发展的客观规律、自觉站在最广大人民的立场上',k:'价值判断 价值选择 规律 人民立场 标准',e:'国家推行"双减"政策（减轻学生负担）——遵循了教育规律（符合客观规律），同时也回应了家长焦虑（站在人民立场）。'},
  {b:'必修4 哲学与文化',c:'历史唯物主义',s:'实现人生价值需要：在劳动和奉献中创造价值、在个人与社会的统一中实现价值、在砥砺自我中走向成功',k:'实现价值 劳动 奉献 社会统一 砥砺自我',e:'张桂梅扎根边疆教育40年（劳动奉献）、社会各界的支持帮助她办学（社会统一）、带病坚持工作（砥砺自我）——三者缺一不可。'},
  {b:'必修4 哲学与文化',c:'历史唯物主义',s:'社会意识的相对独立性表现为：与社会存在不完全同步、能反作用于社会存在',k:'社会意识 独立性 反作用 不同步 先进落后',e:'经济落后的国家也能产生先进思想（马克思主义诞生于19世纪的德国），先进的社会意识能推动社会发展（思想解放）。'},
  {b:'必修4 哲学与文化',c:'文化传承与创新',s:'中华优秀传统文化的当代价值：是民族发展的精神根基、是文化自信的历史来源',k:'传统文化 当代价值 精神根基 文化自信 古为今用',e:'"天下为公"（大同理想）→中国梦；"民为邦本"（民本思想）→以人民为中心——传统文化为当代提供了文化滋养。'},
  {b:'必修4 哲学与文化',c:'文化传承与创新',s:'文化交流的意义：推动中华文化走向世界、促进世界文化繁荣发展',k:'文化交流 走出去 文明互鉴 美美与共 繁荣',e:'孔子学院遍布全球、《三体》海外热销、外国留学生来华学习——在交流中让世界了解中国，在互鉴中促进文明进步。'},
  {b:'必修4 哲学与文化',c:'文化传承与创新',s:'文化创新的根本途径是社会实践，基本途径是继承传统推陈出新、面向世界博采众长',k:'文化创新 社会实践 继承传统 面向世界 根本途径',e:'《只此青绿》取材于《千里江山图》（继承传统），用现代舞台技术呈现（推陈出新）——传统与现代表达的完美结合。'},
  {b:'必修4 哲学与文化',c:'文化传承与创新',s:'发展中国特色社会主义文化要坚持为人民服务、为社会主义服务的方向',k:'文化方向 为人民服务 为社会主义服务 双百方针',e:'《觉醒年代》讴歌革命先烈（为社会主义服务）、"村BA"篮球赛丰富农民生活（为人民服务）——文化要服务人民、服务时代。'},
  {b:'必修4 哲学与文化',c:'文化传承与创新',s:'建设文化强国要坚持以马克思主义为指导，坚守中华文化立场，推动中华文化走向世界',k:'文化强国 马克思主义 中华文化 走出去 文化软实力',e:'中国网络文学海外读者超1.5亿（走出去）、国产影视剧出口持续增长——建设文化强国既要"固本"也要"输出"。'},
  {b:'选必1 当代国际政治与经济',c:'国际政治',s:'国家利益是国际关系的决定性因素，国家间既有共同利益也有利益冲突',k:'国家利益 决定性因素 共同利益 利益冲突 合作',e:'中美在气候问题上合作（共同利益——保护地球），在科技领域竞争（利益冲突——芯片之争）——利益决定关系走向。'},
  {b:'选必1 当代国际政治与经济',c:'国际政治',s:'联合国安理会是联合国唯一有权采取强制行动的机构，五个常任理事国拥有一票否决权',k:'安理会 常任理事国 一票否决权 强制行动 联合国',e:'安理会就巴以冲突投票——美国作为五常之一动用否决权阻止停火决议，体现了大国在联合国中的特殊地位。'},
  {b:'选必1 当代国际政治与经济',c:'国际政治',s:'欧盟是当今世界经济一体化程度最高的区域性国际组织',k:'欧盟 经济一体化 区域组织 欧元 统一市场',e:'欧盟统一使用欧元货币、商品在成员国间自由流动（没有关税壁垒）——一体化程度远超其他区域组织。'},

// ====== 应用逻辑 ======
const CARD_CONTAINER=document.getElementById('cardContainer');
const EMPTY_TIP=document.getElementById('emptyTip');
const PROGRESS_CUR=document.getElementById('curIdx');
const PROGRESS_TOTAL=document.getElementById('totalIdx');
const TOTAL_COUNT=document.getElementById('totalCount');

let filtered=[];
let current=0;
let lastRandom=0;

function getFiltered(){
  const book=document.getElementById('bookFilter').value;
  return book==='all'?cards:cards.filter(c=>c.b===book);
}

function renderCard(card){
  if(!card) return '<div class="card-empty">没有匹配的卡片</div>';
  const keywords=card.k.split(/[、,，\s]+/).filter(Boolean);
  const kwHtml=keywords.map(k=>`<span>${k}</span>`).join('');
  return `<div class="card active">
    <span class="card-badge">${card.b} · ${card.c}</span>
    <div class="card-summary">${card.s}</div>
    <div class="card-label">🔑 关键词</div>
    <div class="card-keywords">${kwHtml}</div>
    <div class="card-label">📝 举例</div>
    <div class="card-example">${card.e}</div>
  </div>`;
}

function updateDisplay(){
  if(filtered.length===0){
    EMPTY_TIP.style.display='flex';
    CARD_CONTAINER.innerHTML='';
    PROGRESS_CUR.textContent='0';
    PROGRESS_TOTAL.textContent='0';
    document.getElementById('prevBtn').disabled=true;
    document.getElementById('nextBtn').disabled=true;
    document.getElementById('randomBtn').disabled=true;
    return;
  }
  EMPTY_TIP.style.display='none';
  if(current<0) current=0;
  if(current>=filtered.length) current=filtered.length-1;
  CARD_CONTAINER.innerHTML=renderCard(filtered[current]);
  PROGRESS_CUR.textContent=current+1;
  PROGRESS_TOTAL.textContent=filtered.length;
  document.getElementById('prevBtn').disabled=filtered.length<=1;
  document.getElementById('nextBtn').disabled=filtered.length<=1;
  document.getElementById('randomBtn').disabled=filtered.length<=1;
}

function onFilterChange(){
  filtered=getFiltered();
  current=0;
  updateDisplay();
}

function goPrev(){
  if(filtered.length<=1) return;
  current=(current-1+filtered.length)%filtered.length;
  updateDisplay();
}

function goNext(){
  if(filtered.length<=1) return;
  current=(current+1)%filtered.length;
  updateDisplay();
}

function goRandom(){
  if(filtered.length<=1) return;
  let r;
  do{r=Math.floor(Math.random()*filtered.length)}while(r===current&&filtered.length>1);
  current=r;
  updateDisplay();
}

// 触屏滑动支持
let touchStartX=0;
let touchEndX=0;
const app=document.getElementById('app');
app.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX},{passive:true});
app.addEventListener('touchend',e=>{
  touchEndX=e.changedTouches[0].screenX;
  const diff=touchStartX-touchEndX;
  if(Math.abs(diff)>50){
    if(diff>0) goNext();
    else goPrev();
  }
},{passive:true});

// 键盘支持
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') goPrev();
  else if(e.key==='ArrowRight') goNext();
  else if(e.key===' '||e.key==='Space'){e.preventDefault();goRandom();}
});

// 初始化
TOTAL_COUNT.textContent=cards.length;
onFilterChange();
</script>
